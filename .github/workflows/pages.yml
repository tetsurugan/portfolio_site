# Build Vite dist/ — not raw repo (`index.html` with /src/main.tsx breaks on Pages).
# Settings → Pages: source "GitHub Actions".
# Intermittent "Runner not acquired" / internal deploy errors are GitHub-side; use "Re-run failed jobs".
name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  actions: write
  contents: read
  id-token: write
  pages: write

concurrency:
  group: pages-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
      - name: Install dependencies
        run: npm install --no-audit --no-fund
        env:
          NODE_ENV: development
      - name: Build
        run: npm run build
        env:
          NODE_ENV: production
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    timeout-minutes: 30
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
