# Build Vite to dist/ and deploy that folder — not the raw repo (which has /src/main.tsx in index.html).
# Repo → Settings → Pages: set source to "GitHub Actions" (not "Deploy from a branch" / root).
name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Narrowing permissions clears unspecified scopes; upload-pages-artifact needs `actions: write`.
permissions:
  actions: write
  contents: read
  id-token: write
  pages: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      # Many CI images set NODE_ENV=production, which makes `npm ci` skip devDependencies.
      # Then `tsc` / `vite` are missing and the build fails in under a second.
      - name: Install dependencies
        run: npm ci
        env:
          NODE_ENV: development
      - name: Build
        run: npm run build
      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
